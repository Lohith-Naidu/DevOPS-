name: Portfolio CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Files
        run: |
          echo "Checking project structure..."
          ls -la

      - name: Build Docker Image
        run: |
          docker build -t lohith-portfolio .

      - name: Success Message
        run: |
          echo "Docker build successful!"