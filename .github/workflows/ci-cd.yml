name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-website:latest .

      - name: Run container test
        run: docker run -d -p 8080:80 devops-website:latest