name: CI-CD GHCR Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/lohith-naidu/devops-website:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        shell: powershell
        run: docker build -t "${env:IMAGE_NAME}" .

      - name: Push image to GHCR
        shell: powershell
        run: docker push "${env:IMAGE_NAME}"