name: CI-CD GHCR Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: self-hosted

    env:
      IMAGE_NAME: ghcr.io/lohith-naidu/devops-website:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        shell: powershell
        run: docker build -t $env:IMAGE_NAME .

      - name: Push Docker image
        shell: powershell
        run: docker push $env:IMAGE_NAME