name: System Health CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  system-health-check:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository (VERY IMPORTANT)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Show repo structure (debug step)
      - name: List files
        run: ls -R

      # 3. Make script executable
      - name: Make script executable
        run: chmod +x linux-scripts/scripts/system-health.sh

      # 4. Run system health script
      - name: Run system health script
        run: bash linux-scripts/scripts/system-health.sh
