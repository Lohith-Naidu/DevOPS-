name: CI Pipeline (Docker Build)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t devops-app .

      - name: Run Docker Container (Test)
        run: |
          docker run -d -p 8080:8080 --name test-container devops-app
          sleep 5
          docker ps
